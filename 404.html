<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diligent Developers</title>
  <script>
    // GitHub Pages serves this 404.html for any unknown path (e.g. /upgrades).
    // Redirect into the single-page app, preserving an "upgrades" hint so the
    // app opens the customer portal directly.
    (function () {
      var path = (window.location.pathname || '').toLowerCase();
      if (path.indexOf('upgrade') !== -1) {
        window.location.replace('/?upgrades');
      } else {
        // any other unknown path -> just send them to the home/app
        window.location.replace('/');
      }
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;text-align:center;margin-top:40px;color:#1a2b4a;">Redirecting…</p>
</body>
</html>
